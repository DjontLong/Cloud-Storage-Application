version: '3.8'
services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - app-network

  app:
    build: .
    ports:
      - "7474:7474"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - minio
    networks:
      - app-network

volumes:
  minio-data:

networks:
  app-network:
    driver: bridge